<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Internal CSS -->
    {% block styleBlock %}
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #212529;
        }

        .navbar-premium {
            background-color: #1e293b;
            /* Premium slate dark */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-premium {
            background: #ffffff;
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
      
    </style>
    {% endblock styleBlock %}


    {% block title %}
    <title>Prisoner Management System</title>
    {% endblock title %}
</head>

<body>

    <nav class="navbar navbar-dark navbar-premium sticky-top py-3 mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold gap-2" href="#">
                <i class="fa-solid fa-shield-halved text-warning fs-4"></i>
                <span class="tracking-wide" style="color: #1e293b">PRISONER MANAGEMENT</span>
            </a>
            <div class="d-flex text-light-50 small">
                <span class="me-3"><i class="fa-regular fa-calendar me-1"></i> Admin Dashboard</span>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        {% block content %}
        {% endblock content %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>

</html>
